name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Install uv
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        # Enables caching of uv's virtual environments between runs.
        enable-cache: true

    # Set up Python using the .python-version file
    - name: Set up Python
      run: uv python install

    # Install dependencies
    - name: Install the project
      run: uv sync --frozen

    - name: Check code
      run: uvx ruff check . --output-format=github

    # Run tests
    - name: Run tests
      run: uv run pytest --junitxml=junit.xml

    - name: Create test result summary
      uses: test-summary/action@v2
      with:
        paths: "junit.xml"
      # ensure this runs even if tests fail
      if: always()